server:
  port: 8080

spring:
  application:
    name: wms-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    issuer: wms
    secret: ${JWT_SECRET}
    expirationMinutes: ${JWT_EXPIRATION_MINUTES}
    clockSkewSeconds: ${JWT_CLOCK_SKEW_SECONDS}
