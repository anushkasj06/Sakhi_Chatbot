server:
  port: 8080

spring:
  application:
    name: wms-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    issuer: wms
    secret: ${JWT_SECRET}
    expirationMinutes: ${JWT_EXPIRATION_MINUTES}
    refreshExpirationMinutes: ${JWT_REFRESH_EXPIRATION_MINUTES}
    clockSkewSeconds: ${JWT_CLOCK_SKEW_SECONDS}

  admin:
    email: ${APP_ADMIN_EMAIL}
    password: ${APP_ADMIN_PASSWORD}
    name: ${APP_ADMIN_NAME:Super Admin}

  mail:
    from: ${APP_MAIL_FROM}
    verifyBaseUrl: ${APP_VERIFY_BASE_URL:http://localhost:5173/verify-email}
    resetBaseUrl: ${APP_RESET_BASE_URL:http://localhost:5173/reset-password}

  alerts:
    low-stock:
      threshold: ${APP_LOW_STOCK_THRESHOLD:10}
      scan-ms: ${APP_LOW_STOCK_SCAN_MS:300000}
